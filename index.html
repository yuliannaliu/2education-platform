<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI教育平台 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 48px;
            max-width: 520px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .logo { font-size: 56px; margin-bottom: 16px; }
        .title { 
            font-size: 28px; 
            font-weight: 700; 
            color: #1e293b; 
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle { 
            font-size: 14px; 
            color: #64748b; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .nav-grid { display: flex; flex-direction: column; gap: 16px; }
        .nav-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: #f8fafc;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .nav-card:hover {
            background: #fff;
            border-color: #e2e8f0;
            transform: translateX(8px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .card-icon.student { 
            background: linear-gradient(135deg, #10b981, #059669); 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .card-icon.teacher { 
            background: linear-gradient(135deg, #6366f1, #8b5cf6); 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .card-icon.admin { 
            background: linear-gradient(135deg, #f59e0b, #fbbf24); 
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .card-info { flex: 1; }
        .card-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: #1e293b; 
            margin-bottom: 3px;
        }
        .card-desc { 
            font-size: 12px; 
            color: #64748b; 
        }
        .card-arrow {
            font-size: 18px;
            color: #94a3b8;
            transition: all 0.3s;
        }
        .nav-card:hover .card-arrow {
            color: #6366f1;
            transform: translateX(4px);
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .footer-text { font-size: 12px; color: #94a3b8; }
        .footer-link { color: #6366f1; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎓</div>
            <h1 class="title">AI教育平台</h1>
            <p class="subtitle">Smart Learning Platform</p>
        </div>
        
        <div class="nav-grid">
            <a href="teacherai.html" class="nav-card">
                <div class="card-icon teacher">👩‍🏫</div>
                <div class="card-info">
                    <div class="card-title">教师端</div>
                    <div class="card-desc">课程管理 · 作业批改 · 成绩统计</div>
                </div>
                <span class="card-arrow">→</span>
            </a>
            
            <a href="studentai.html" class="nav-card">
                <div class="card-icon student">👨‍🎓</div>
                <div class="card-info">
                    <div class="card-title">学生端</div>
                    <div class="card-desc">课程学习 · AI学伴 · 作业提交</div>
                </div>
                <span class="card-arrow">→</span>
            </a>
            
            <a href="adminai.html" class="nav-card">
                <div class="card-icon admin">👔</div>
                <div class="card-info">
                    <div class="card-title">管理员端</div>
                    <div class="card-desc">系统管理 · 用户管理 · 数据统计</div>
                </div>
                <span class="card-arrow">→</span>
            </a>
        </div>
        
        <div class="footer">
            <p class="footer-text">© 2024 AI教育平台 | <a href="#" class="footer-link">关于我们</a></p>
        </div>
    </div>
</body>
</html>
